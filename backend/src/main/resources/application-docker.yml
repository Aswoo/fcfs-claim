spring:
  datasource:
    url: jdbc:mysql://mysql:3306/fcfs_claim?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379

server:
  port: 8081
  error:
    include-message: always
