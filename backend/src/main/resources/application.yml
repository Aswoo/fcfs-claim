spring:
  datasource:
    url: jdbc:h2:mem:fcfs_claim;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
    show-sql: true

server:
  port: 8081
  error:
    include-message: always
