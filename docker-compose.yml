services:

  # -----------------------------------------------
  # Nginx — 리버스 프록시 + 로드밸런서 + Rate Limiter
  # 외부에서 오는 모든 요청의 첫 번째 관문
  # -----------------------------------------------
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"       # 외부 80 → 컨테이너 80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
    restart: always

  # -----------------------------------------------
  # Spring Boot 인스턴스 1
  # -----------------------------------------------
  app1:
    build:
      context: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_USERNAME: root
      DB_PASSWORD: password
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: on-failure

  # -----------------------------------------------
  # Spring Boot 인스턴스 2 (로드밸런싱용)
  # -----------------------------------------------
  app2:
    build:
      context: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_USERNAME: root
      DB_PASSWORD: password
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: on-failure

  # -----------------------------------------------
  # MySQL 8.0
  # -----------------------------------------------
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: fcfs_claim
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"   # 로컬에서 DB 클라이언트로 직접 접속 가능
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------
  # Redis 7.0
  # -----------------------------------------------
  redis:
    image: redis:7.0-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb
    volumes:
      - redis_data:/data

volumes:
  mysql_data:   # MySQL 데이터 영속 저장
  redis_data:   # Redis AOF 파일 영속 저장
