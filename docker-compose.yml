services:

  # -----------------------------------------------
  # Nginx — 리버스 프록시 + 로드밸런서 + Rate Limiter
  # -----------------------------------------------
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: always

  # -----------------------------------------------
  # Spring Boot 애플리케이션
  # 실행 시 --scale app=N 으로 인스턴스 수 지정
  #   docker compose up --scale app=2
  #   docker compose up --scale app=4
  # -----------------------------------------------
  app:
    build:
      context: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_USERNAME: root
      DB_PASSWORD: password
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: on-failure
    # ports 없음: 외부 직접 접근 차단, Nginx 통해서만 접근

  # -----------------------------------------------
  # MySQL 8.0
  # -----------------------------------------------
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: fcfs_claim
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------
  # Redis 7.0
  # -----------------------------------------------
  redis:
    image: redis:7.0-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb
    volumes:
      - redis_data:/data

  # -----------------------------------------------
  # InfluxDB 1.8 — k6 메트릭 저장소
  # k6 --out influxdb=http://localhost:8086/k6 로 데이터 전송
  # -----------------------------------------------
  influxdb:
    image: influxdb:1.8
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB: k6
      INFLUXDB_HTTP_AUTH_ENABLED: "false"
    volumes:
      - influxdb_data:/var/lib/influxdb

  # -----------------------------------------------
  # Grafana — 시각화 대시보드
  # http://localhost:3000  (admin / admin)
  # InfluxDB 데이터소스 + k6 대시보드 자동 설정됨
  # -----------------------------------------------
  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - influxdb

volumes:
  mysql_data:
  redis_data:
  influxdb_data:
  grafana_data:
