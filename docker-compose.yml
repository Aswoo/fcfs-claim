services:

  # -----------------------------------------------
  # Nginx — 리버스 프록시 + 로드밸런서 + Rate Limiter
  # -----------------------------------------------
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: always

  # -----------------------------------------------
  # Spring Boot 애플리케이션
  # 실행 시 --scale app=N 으로 인스턴스 수 지정
  #   docker compose up --scale app=2
  #   docker compose up --scale app=4
  # -----------------------------------------------
  app:
    build:
      context: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_USERNAME: root
      DB_PASSWORD: password
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: on-failure
    # ports 없음: 외부 직접 접근 차단, Nginx 통해서만 접근

  # -----------------------------------------------
  # MySQL 8.0
  # -----------------------------------------------
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: fcfs_claim
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------
  # Redis 7.0
  # -----------------------------------------------
  redis:
    image: redis:7.0-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
