apiVersion: apps/v1
kind: Deployment
metadata:
  name: fcfs-app
  namespace: fcfs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fcfs-app
  template:
    metadata:
      labels:
        app: fcfs-app
    spec:
      containers:
        - name: fcfs-app
          image: docker.io/library/fcfs-claim-app:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: DB_USERNAME
              value: root
            - name: DB_PASSWORD
              value: password
            - name: JAVA_OPTS
              # MaxRAMPercentage=90% → 힙 = 256Mi×90% = 230Mi
              # Non-Heap(Metaspace+Threads+CodeCache) ≈ 200Mi
              # 합계 ≈ 430Mi → limit(256Mi) 대비 170Mi 초과 → OOMKilled
              value: "-XX:MaxRAMPercentage=90.0"
          ports:
            - containerPort: 8081
          resources:
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "256Mi"   # 의도적으로 작게 설정
          readinessProbe:
            httpGet:
              path: /api/v1/events/1/products
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
