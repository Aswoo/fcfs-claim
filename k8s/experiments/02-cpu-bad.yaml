apiVersion: apps/v1
kind: Deployment
metadata:
  name: fcfs-app
  namespace: fcfs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fcfs-app
  template:
    metadata:
      labels:
        app: fcfs-app
    spec:
      containers:
        - name: fcfs-app
          image: docker.io/library/fcfs-claim-app:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: DB_USERNAME
              value: root
            - name: DB_PASSWORD
              value: password
            - name: JAVA_OPTS
              # UseContainerSupport OFF → JVM이 노드 전체 CPU를 봄
              # availableProcessors() = 노드 CPU 수 (예: 8개)
              # ForkJoinPool = 7스레드 생성 → CPU 1코어에서 7스레드 경쟁 → context switching 폭발
              value: "-XX:-UseContainerSupport -XX:MaxRAMPercentage=60.0"
          ports:
            - containerPort: 8081
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"    # 1코어 limit
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /api/v1/events/1/products
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
