events {
    worker_connections 1024;
}

http {
    # -----------------------------------------------
    # Docker 내부 DNS 서버
    # 컨테이너가 추가/제거될 때 5초마다 재조회해서 새 인스턴스를 인식
    # 127.0.0.11 = Docker Compose 네트워크의 내장 DNS
    # -----------------------------------------------
    resolver 127.0.0.11 valid=5s ipv6=off;

    # -----------------------------------------------
    # Rate Limit 존 정의
    # -----------------------------------------------
    limit_req_zone $binary_remote_addr zone=queue_zone:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=api_zone:10m  rate=30r/s;

    # -----------------------------------------------
    # 업스트림 — 서비스 이름 하나만 선언
    #
    # Docker DNS가 "app"을 현재 실행 중인 모든 app 컨테이너 IP로 resolve.
    # --scale app=N 으로 인스턴스를 늘리면 자동으로 분산 대상에 포함됨.
    #
    # [SSE 멀티인스턴스 한계]
    # round-robin이면 SSE 구독(app1)과 processQueue 실행(app2)이
    # 다른 인스턴스에 붙을 수 있어 READY 알림 누락 가능.
    # 근본 해결: Redis Pub/Sub (추후 구현 예정)
    # 임시 완화: least_conn — 연결 수 적은 인스턴스 우선 배정으로
    #            같은 유저가 같은 인스턴스에 붙을 확률을 높임.
    # -----------------------------------------------
    upstream backend {
        least_conn;
        server app:8081;
    }

    server {
        listen 80;

        # 대기열 진입
        location /api/v1/queue/enter {
            limit_req zone=queue_zone burst=5 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # SSE 구독 — 타임아웃 길게, 버퍼링 끔
        # proxy_buffering off: SSE는 스트리밍이라 버퍼링하면 이벤트가 묶여서 전달됨
        location /api/v1/queue/subscribe {
            proxy_pass http://backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header Connection        '';
            proxy_http_version                 1.1;
            proxy_buffering                    off;
            proxy_read_timeout                 600s;
        }

        # 일반 API
        location /api/ {
            limit_req zone=api_zone burst=20 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        limit_req_status 429;
    }
}
