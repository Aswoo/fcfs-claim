events {
    worker_connections 1024;
}

http {
    # -----------------------------------------------
    # Rate Limit 존 정의
    # $binary_remote_addr = 요청자 IP 기준으로 제한
    # zone=이름:메모리크기  rate=초당허용요청수
    # -----------------------------------------------
    limit_req_zone $binary_remote_addr zone=queue_zone:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=api_zone:10m  rate=30r/s;

    # -----------------------------------------------
    # 업스트림 (로드밸런싱 대상 서버 목록)
    # docker-compose 서비스명:포트 로 지정
    # 기본 알고리즘: round-robin (순서대로 번갈아 분산)
    # -----------------------------------------------
    upstream backend {
        server app1:8081;
        server app2:8081;
    }

    server {
        listen 80;

        # 대기열 진입 — 가장 엄격한 제한
        # 1인당 초당 5개, burst 5개까지 허용 후 즉시 거절(nodelay)
        location /api/v1/queue/enter {
            limit_req zone=queue_zone burst=5 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # 일반 API — 여유있는 제한
        location /api/ {
            limit_req zone=api_zone burst=20 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # Rate limit 초과 시 응답
        limit_req_status 429;
    }
}
